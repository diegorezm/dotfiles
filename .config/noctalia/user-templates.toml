[templates.nvim-base16]
input_path = "~/.config/nvim/lua/matugen-template.lua"
output_path = "~/.config/nvim/lua/matugen.lua"
post_hook = 'pkill -SIGUSR1 nvim'

[templates.rofi]
input_path  = "~/.config/noctalia/templates/rofi.rasi"
output_path = "~/.config/rofi/noctalia-theme.rasi"
post_hook   = "pkill rofi; true"

[templates.tmux]
input_path  = "~/.config/noctalia/templates/tmux.conf"
output_path = "~/.tmux/noctalia-theme.conf"
post_hook   = "tmux source-file ~/.tmux.conf"

# User-defined templates
# Add your custom templates below
# Example:
# [templates.myapp]
