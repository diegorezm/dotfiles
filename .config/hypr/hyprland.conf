################
### MONITORS ###
################

monitor = , preferred, auto, auto


#################
### VARIABLES ###
#################

$scratchpadSize = 70% 75%
$mainMod    = SUPER
$ipc = qs -c noctalia-shell ipc call
$terminal   = kitty
$fileManager = thunar
$browser    = zen-browser
$menu       = rofi -show drun


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


#################
### AUTOSTART ###
#################

exec-once = qs -c noctalia-shell
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = discord
exec-once = "$HOME/.config/hypr/init-xdg-desktop.sh"
exec-once = steam
exec-once = emacs --daemon
exec-once = [workspace special:spotify silent] spotify-launcher
exec-once = [workspace special:terminal silent] kitty --class "TERMINAL_SCRATCHPAD"


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in  = 5
    gaps_out = 10

    border_size = 2
    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing    = false
    layout           = master
}

decoration {
    rounding       = 5
    rounding_power = 2

    shadow {
        enabled      = true
        range        = 4
        render_power = 3
        color        = rgba(1a1a1aee)
    }

    blur {
        enabled   = true
        size      = 3
        passes    = 3
        vibrancy  = 0.1696
    }
}

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo   = false
}


##############
### LAYOUT ###
##############

master {
    new_status = master
}

dwindle {
    pseudotile    = true
    preserve_split = true
}


#############
### INPUT ###
#############

input {
    kb_layout  = br
    kb_model   = abnt2
    kb_variant =
    kb_options =
    kb_rules   =

    follow_mouse = 1
    sensitivity  = 0

    repeat_rate  = 50
    repeat_delay = 300

    touchpad {
        natural_scroll = false
    }
}

# 3-finger swipe to switch workspaces
gesture = 3, horizontal, workspace

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# Apps
bind = $mainMod,       RETURN, exec,          	$terminal
bind = $mainMod SHIFT, RETURN, exec,     	emacsclient -c
bind = $mainMod,       W,      exec,          	$browser
bind = $mainMod,       D,      exec,          	$menu

bind = CTRL SHIFT,     F1,     exec,         	$ipc sessionMenu toggle
bind = CTRL SHIFT,     F2,     exec,         	$ipc wallpaper toggle
bind = $mainMod,       A,     exec,         	$ipc volume togglePanel

bind = $mainMod,       E,     exec, 		$fileManager
bind = $mainMod,       Z,     exec, 		dir_quick_search
bind = $mainMod,       C,     exec, 		config_quick_search

bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy

# Window management
bind = $mainMod,       Q,      killactive,
bind = $mainMod,       V,      togglefloating,
# bind = $mainMod SHIFT, RETURN, layoutmsg,     swapwithmaster master
bind = $mainMod SHIFT,       Q,      exec,          command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Focus (vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d 

bindel = $mainMod CTRL, l, resizeactive, 20 0
bindel = $mainMod CTRL, h, resizeactive, -20 0
bindel = $mainMod CTRL, k, resizeactive, 0 -20
bindel = $mainMod CTRL, j, resizeactive, 0 20 

# Resize
inde = $mainMod CTRL, j, resizeactive, 0 -40
binde = $mainMod CTRL, k, resizeactive, 0 40

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic
bind = $mainMod,       S, togglespecialworkspace, terminal
bind = $mainMod,       M, togglespecialworkspace, spotify

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl -e4 -n2 set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Media (requires playerctl)
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name        = spotify-scratchpad
    match:class = ^(Spotify|spotify)$

    workspace = special:spotify
    size      = $scratchpadSize
    center    = true
    float = on
    maximize = off

}

windowrule {
    name        = terminal-scratchpad
    match:class = ^(TERMINAL_SCRATCHPAD)$

    workspace = special:terminal
    size      = $scratchpadSize
    center    = true
    float = on
    maximize = off

}

windowrule {
    name        =  file-manager
    match:class = ^(thunar|Thunar)$
    center    = true
    float = on
    maximize = off

}

windowrule {
    name        = discord-workspace
    match:class = ^(discord|Discord)$

    workspace = 9
}
windowrule {
    name        = steam-workspace
    match:class = ^(steam|Steam)$

    workspace = 8
}

windowrule {
    name       = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix dragging issues with XWayland floating windows
    name             = fix-xwayland-drags
    match:class      = ^$
    match:title      = ^$
    match:xwayland   = true
    match:float      = true
    match:fullscreen = false
    match:pin        = false

    no_focus = true
}

windowrule {
    name        = move-hyprland-run
    match:class = hyprland-run

    float = yes
    move  = 20 monitor_h-120
}

windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

layerrule {
    name            = noctalia
    match:namespace = noctalia-background-.*$

    ignore_alpha = 0.5
    blur         = true
    blur_popups  = true
}

windowrule {
    name      = file-picker-gtk
    match:class = ^(xdg-desktop-portal-gtk)$
    float     = on
    center    = true
    size      = 900 700
    maximize  = off
}
windowrule {
    name      = file-picker-kde
    match:class = ^(xdg-desktop-portal-kde|org.kde.kdialog)$
    float     = on
    center    = true
    size      = 900 700
    maximize  = off
}
windowrule {
    name      = file-picker-hyprland
    match:class = ^(hyprland-share-picker)$
    float     = on
    center    = true
    maximize  = off
}

